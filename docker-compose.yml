version: '3'

services:
  # ===== 1. ikuai-exporter: 采集器 =====
  ikuai-exporter:
    image: jakes/ikuai-exporter:latest
    container_name: ikuai-exporter
    restart: always
    environment:
      IKUAI_URL: "${IKUAI_URL}"
      IKUAI_USERNAME: "${IKUAI_USERNAME}"
      IKUAI_PASSWORD: "${IKUAI_PASSWORD}"
      IKUAI_MODULES: "sysStat,lanDevice,interfaceInfo"
      IKUAI_INSECURE_SKIP: "true"
      IKUAI_LEVEL: "info"
    ports:
      - "9191:9090"
    networks:
      - ikuai-monitor

  # ===== 2. Prometheus: 时序数据库 =====
  prometheus:
    image: prom/prometheus:latest
    container_name: ikuai-prometheus
    restart: always
    user: "root"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9192:9090"
    networks:
      - ikuai-monitor

  # ===== 3. ikuaiview: 看板 =====
  ikuaiview:
    build: .
    container_name: ikuaiview
    restart: always
    environment:
      IKUAI_EXPORTER_URL: "http://ikuai-exporter:9090"
      PROMETHEUS_URL: "http://prometheus:9090"
      IKUAI_URL: "${IKUAI_URL}"
      IKUAI_USERNAME: "${IKUAI_USERNAME}"
      IKUAI_PASSWORD: "${IKUAI_PASSWORD}"
      PORT: "9193"
    ports:
      - "9193:9193"
    depends_on:
      - ikuai-exporter
      - prometheus
    networks:
      - ikuai-monitor

networks:
  ikuai-monitor:
    driver: bridge
