# iKuaiView 完整三件套（官方部署模板）
#
# 目录结构（通用，可改到任意路径）：
#   ./
#   ├── docker-compose.yml
#   ├── .env
#   ├── prometheus/
#   │   └── prometheus.yml
#   ├── prometheus-data/
#   └── data/                    # 看板持久化（本月用量 & 终端累计）
#
# 首次：
#   cp .env.example .env   # 填写 iKuai 只读账号
#   mkdir -p prometheus prometheus-data data
#   # 确保 prometheus/prometheus.yml 存在（仓库已提供模板）
#   docker-compose pull && docker-compose up -d
#
# 访问：
#   看板       http://<主机IP>:3000
#   exporter   http://<主机IP>:9191/metrics
#   Prometheus http://<主机IP>:9192

version: "3.8"

services:
  # ===== 1. ikuai-exporter: 采集器 =====
  ikuai-exporter:
    image: jakes/ikuai-exporter:latest
    container_name: ikuai-exporter
    restart: always
    environment:
      IKUAI_URL: "${IKUAI_URL}"
      IKUAI_USERNAME: "${IKUAI_USERNAME}"
      IKUAI_PASSWORD: "${IKUAI_PASSWORD}"
      IKUAI_MODULES: "sysStat,lanDevice,interfaceInfo"
      IKUAI_INSECURE_SKIP: "true"
      IKUAI_LEVEL: "info"
    ports:
      - "9191:9090"
    networks:
      - ikuai-monitor

  # ===== 2. Prometheus: 时序数据库 =====
  prometheus:
    image: prom/prometheus:latest
    container_name: ikuai-prometheus
    restart: always
    user: "root"   # 避免挂载目录无写权限导致 panic
    volumes:
      # 通用相对路径；NAS/群晖可改成你自己的绝对路径
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9192:9090"
    depends_on:
      - ikuai-exporter
    networks:
      - ikuai-monitor

  # ===== 3. ikuaiview: 看板（替代 Grafana）=====
  ikuaiview:
    # Docker Hub 默认；也可改用 ghcr.io/lzylipu/ikuaiview:latest
    image: ${IKUAIVIEW_IMAGE:-lzylipu/ikuaiview:latest}
    container_name: ikuaiview
    restart: always
    environment:
      IKUAI_URL: "${IKUAI_URL}"
      IKUAI_USERNAME: "${IKUAI_USERNAME}"
      IKUAI_PASSWORD: "${IKUAI_PASSWORD}"
      # 容器内互访必须用服务名，不要写宿主机 IP
      IKUAI_EXPORTER_URL: "http://ikuai-exporter:9090"
      PROMETHEUS_URL: "http://prometheus:9090"
      IKUAI_PORT: "3000"
      # 北京时间显示（爱快 pppoe_updatetime 是 Unix 时戳，避免 UTC 容器导致连接时间差 8h）
      TZ: "Asia/Shanghai"
      # SQLite 持久化路径（默认 /data，挂载到宿主 ./data，跨爱快重启不丢本月用量与终端累计）
      IKUAIVIEW_DATA_DIR: "/data"
      # 本月用量来自 homepage（较重），默认 300s 刷新一次
      IKUAIVIEW_HOMEPAGE_TTL: "${IKUAIVIEW_HOMEPAGE_TTL:-300}"
      # 元数据轮询间隔（秒），默认 30
      IKUAIVIEW_METADATA_POLL_SECONDS: "${IKUAIVIEW_METADATA_POLL_SECONDS:-30}"
      # 看板 WS 推送间隔（秒），默认 5；exporter 缓存同 TTL
      IKUAIVIEW_WS_PUSH_SECONDS: "${IKUAIVIEW_WS_PUSH_SECONDS:-5}"
      IKUAIVIEW_EXPORTER_CACHE_TTL: "${IKUAIVIEW_EXPORTER_CACHE_TTL:-5}"
    volumes:
      # 看板持久化（本月用量、终端字节累计、爱快重启基线）
      - ./data:/data
    ports:
      # 默认 3000；若要沿用 91xx 习惯可改为 "9193:3000"
      - "3000:3000"
    depends_on:
      - ikuai-exporter
      - prometheus
    networks:
      - ikuai-monitor

networks:
  ikuai-monitor:
    driver: bridge
