version: '3'

services:
  # ===== 1. ikuai-exporter: 采集器 =====
  ikuai-exporter:
    image: jakes/ikuai-exporter:latest
    container_name: ikuai-exporter
    restart: always
    environment:
      IKUAI_URL: "http://10.10.0.1"
      IKUAI_USERNAME: "api"
      IKUAI_PASSWORD: "zz123123"
      IKUAI_MODULES: "sysStat,lanDevice,interfaceInfo"
      IKUAI_INSECURE_SKIP: "true"
      IKUAI_LEVEL: "info"
    ports:
      - "9191:9090"
    networks:
      - ikuai-monitor

  # ===== 2. Prometheus: 时序数据库 =====
  prometheus:
    image: prom/prometheus:latest
    container_name: ikuai-prometheus
    restart: always
    user: "root"
    volumes:
      - /volume6/docker/ikuai/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /volume6/docker/ikuai/prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9192:9090"
    networks:
      - ikuai-monitor

  # ===== 3. Grafana: 看板 (可选，若不使用可注释/删掉) =====
  grafana:
    image: grafana/grafana:latest
    container_name: ikuai-grafana
    restart: always
    user: "0"
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - /volume6/docker/ikuai/grafana-provisioning:/etc/grafana/provisioning:ro
      - /volume6/docker/ikuai/grafana-dashboards:/var/lib/grafana/dashboards:ro
      - /volume6/docker/ikuai/grafana-data:/var/lib/grafana
    ports:
      - "9190:3000"
    depends_on:
      - prometheus
    networks:
      - ikuai-monitor

  # ===== 4. ikuai-routerview: 容器3 (借用视觉样式的轻量级爱快网络看板) =====
  ikuai-routerview:
    build: .
    container_name: ikuai-routerview
    restart: always
    environment:
      # 对接局域网内的容器 1 和 容器 2 接口
      IKUAI_EXPORTER_URL: "http://10.10.0.2:9191"
      PROMETHEUS_URL: "http://10.10.0.2:9192"
      PORT: "9193"
    ports:
      - "9193:9193"
    networks:
      - ikuai-monitor

networks:
  ikuai-monitor:
    driver: bridge
