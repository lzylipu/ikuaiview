<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RouterView — iKuai 看板</title>
  <!-- 引入 Feather 图标和 ECharts CDN -->
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
  <style>
    /* ── 样式变量与基础 ──────────────────────────────── */
    :root {
      --color-bg-primary: #0f1219;
      --color-bg-secondary: #141820;
      --color-bg-card: #1a1e2b;
      --color-bg-card-hover: #1e2434;
      --color-text-primary: #e4e7f0;
      --color-text-secondary: #b2b8ca;
      --color-text-muted: #969db3;
      --color-accent: #4f8cff;
      --color-accent-subtle: rgba(79, 140, 255, 0.12);
      --color-success: #22c55e;
      --color-success-subtle: rgba(34, 197, 94, 0.12);
      --color-warning: #f59e0b;
      --color-danger: #f66a6a;
      --color-border: #363b50;
      --color-border-light: #262b3a;
      
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--color-bg-primary);
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      padding: 20px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── 布局结构 ──────────────────────────────────── */
    .dashboard {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      max-width: 1600px;
      margin: 0 auto;
    }

    @media (max-width: 1024px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
    }

    /* ── 卡片通用样式 ────────────────────────────────── */
    .card {
      background-color: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      transition: border-color 0.25s, background-color 0.25s;
    }

    .card:hover {
      background-color: var(--color-bg-card-hover);
      border-color: var(--color-accent);
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title i {
      color: var(--color-accent);
      width: 18px;
      height: 18px;
    }

    /* ── 左侧面板 ──────────────────────────────────── */
    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .brand-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .brand-logo {
      background: linear-gradient(135deg, var(--color-accent), #82b1ff);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0f1219;
      font-weight: bold;
      font-size: 20px;
    }

    .brand-title h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .brand-title span {
      font-size: 11px;
      color: var(--color-text-muted);
      font-family: var(--font-mono);
    }

    /* 指标条组 */
    .metric-row {
      margin-bottom: 16px;
    }

    .metric-info {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--color-text-secondary);
    }

    .metric-value {
      font-family: var(--font-mono);
      font-weight: 600;
      color: var(--color-text-primary);
    }

    .progress-bar-bg {
      background-color: var(--color-bg-secondary);
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      background-color: var(--color-accent);
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .progress-bar-fill.success {
      background-color: var(--color-success);
    }
    
    .progress-bar-fill.warning {
      background-color: var(--color-warning);
    }

    .progress-bar-fill.danger {
      background-color: var(--color-danger);
    }

    /* 接口状态 */
    .info-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      padding-bottom: 8px;
      border-bottom: 1px dashed var(--color-border-light);
    }

    .info-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .info-label {
      color: var(--color-text-muted);
    }

    .info-val {
      font-family: var(--font-mono);
      font-weight: 500;
    }

    .status-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
    }

    .status-badge.online {
      background-color: var(--color-success-subtle);
      color: var(--color-success);
    }

    /* ── 右侧面板 ──────────────────────────────────── */
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* 流量速率卡片 */
    .throughput-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .throughput-stats {
      display: flex;
      gap: 30px;
    }

    .stat-box {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font-size: 12px;
      color: var(--color-text-muted);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      font-family: var(--font-mono);
    }

    .stat-value.download {
      color: var(--color-accent);
    }

    .stat-value.upload {
      color: var(--color-success);
    }

    .chart-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      background-color: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      color: var(--color-text-secondary);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn:hover, .btn.active {
      border-color: var(--color-accent);
      color: var(--color-text-primary);
      background-color: var(--color-accent-subtle);
    }

    #traffic-chart {
      width: 100%;
      height: 320px;
    }

    /* 活跃客户端设备列表 */
    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 13px;
    }

    th {
      color: var(--color-text-muted);
      font-weight: 600;
      padding: 12px 10px;
      border-bottom: 2px solid var(--color-border);
      cursor: pointer;
      user-select: none;
    }

    th:hover {
      color: var(--color-text-primary);
    }

    td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--color-border-light);
      vertical-align: middle;
    }

    tr:hover td {
      background-color: var(--color-bg-secondary);
    }

    .dev-name-col {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .dev-name {
      font-weight: 600;
      color: var(--color-text-primary);
    }

    .dev-mac {
      font-size: 11px;
      color: var(--color-text-muted);
      font-family: var(--font-mono);
    }

    .dev-ip {
      font-family: var(--font-mono);
      color: var(--color-text-secondary);
    }

    .dev-rate {
      font-family: var(--font-mono);
      font-weight: 600;
    }

    .rate-down {
      color: var(--color-accent);
    }

    .rate-up {
      color: var(--color-success);
    }

    .dev-conns {
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>

  <div class="dashboard">
    
    <!-- ── 左侧系统资源 ──────────────────────────────── -->
    <div class="left-panel">
      <!-- 品牌标识 -->
      <div class="card brand-header">
        <div class="brand-logo">V</div>
        <div class="brand-title">
          <h1>RouterView</h1>
          <span id="sys-version">iKuai --.--.--</span>
        </div>
      </div>

      <!-- 系统状态 -->
      <div class="card">
        <div class="card-title">
          <i data-feather="cpu"></i>系统负荷
        </div>
        
        <!-- CPU 使用率 -->
        <div class="metric-row">
          <div class="metric-info">
            <span>CPU 使用率</span>
            <span id="cpu-text" class="metric-value">0%</span>
          </div>
          <div class="progress-bar-bg">
            <div id="cpu-bar" class="progress-bar-fill" style="width: 0%"></div>
          </div>
        </div>

        <!-- 内存使用率 -->
        <div class="metric-row">
          <div class="metric-info">
            <span>内存已用 (<span id="mem-mb">0/0</span> MB)</span>
            <span id="mem-text" class="metric-value">0%</span>
          </div>
          <div class="progress-bar-bg">
            <div id="mem-bar" class="progress-bar-fill success" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <!-- 接口和基本信息 -->
      <div class="card">
        <div class="card-title">
          <i data-feather="git-commit"></i>接口状态
        </div>
        <div class="info-list">
          <div class="info-item">
            <span class="info-label">LAN 网关</span>
            <span id="lan-ip" class="info-val">--.--.--.--</span>
          </div>
          <div class="info-item">
            <span class="info-label">WAN 地址</span>
            <span id="wan-ip" class="info-val">--.--.--.--</span>
          </div>
          <div class="info-item">
            <span class="info-label">拨号协议</span>
            <span id="wan-proto" class="info-val">-</span>
          </div>
          <div class="info-item">
            <span class="info-label">在线设备</span>
            <span id="dev-count" class="info-val">0 台</span>
          </div>
          <div class="info-item">
            <span class="info-label">运行时长</span>
            <span id="sys-uptime" class="info-val">-</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── 右侧图表与设备列表 ────────────────────────── -->
    <div class="right-panel">
      <!-- 流量图表卡片 -->
      <div class="card">
        <div class="throughput-header">
          <div class="throughput-stats">
            <div class="stat-box">
              <div class="stat-label">
                <i data-feather="arrow-down-circle" style="color: var(--color-accent); width: 14px; height: 14px;"></i>下载速率
              </div>
              <div id="wan-down-speed" class="stat-value download">0.00 KB/s</div>
            </div>
            <div class="stat-box">
              <div class="stat-label">
                <i data-feather="arrow-up-circle" style="color: var(--color-success); width: 14px; height: 14px;"></i>上传速率
              </div>
              <div id="wan-up-speed" class="stat-value upload">0.00 KB/s</div>
            </div>
          </div>
          <div class="chart-actions">
            <button class="btn active" id="btn-realtime" onclick="setChartMode('realtime')">实时数据</button>
            <button class="btn" id="btn-15m" onclick="setChartMode('15m')">15 分钟</button>
            <button class="btn" id="btn-1h" onclick="setChartMode('1h')">1 小时</button>
            <button class="btn" id="btn-24h" onclick="setChartMode('24h')">24 小时</button>
          </div>
        </div>
        
        <!-- ECharts 实例 -->
        <div id="traffic-chart"></div>
      </div>

      <!-- 设备网速看板卡片 -->
      <div class="card">
        <div class="card-title">
          <i data-feather="users"></i>活跃设备流量监控
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th onclick="sortTable('name')">终端名称 / MAC</th>
                <th onclick="sortTable('ip')">IP 地址</th>
                <th onclick="sortTable('down_rate')">当前下载 <i data-feather="chevron-down" style="width: 12px; height: 12px; vertical-align: middle;"></i></th>
                <th onclick="sortTable('up_rate')">当前上传</th>
                <th onclick="sortTable('conns')">并发连接</th>
              </tr>
            </thead>
            <tbody id="device-table-body">
              <tr>
                <td colspan="5" style="text-align: center; color: var(--color-text-muted);">等待数据载入...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ── 变量初始化 ──────────────────────────────────────
    let chartMode = 'realtime'; // 'realtime', '15m', '1h', '24h'
    let currentDevices = [];
    let sortKey = 'down_rate';
    let sortDesc = true;
    let sseSource = null;
    let fallbackInterval = null;

    // 内存实时绘图历史缓冲区
    const MAX_REALTIME_POINTS = 60; // 2 分钟，2秒一个点
    let realtimeTimeline = [];
    let realtimeDownData = [];
    let realtimeUpData = [];

    // 初始化 ECharts
    const chartDom = document.getElementById('traffic-chart');
    const myChart = echarts.init(chartDom);
    
    // 自定义 Dark 主题配置
    const chartOption = {
      backgroundColor: 'transparent',
      tooltip: {
        trigger: 'axis',
        backgroundColor: '#1a1e2b',
        borderColor: '#363b50',
        textStyle: { color: '#e4e7f0' },
        formatter: function (params) {
          let res = params[0].name + '<br/>';
          params.forEach(item => {
            res += `<span style="display:inline-block;margin-right:4px;border-radius:10px;width:10px;height:10px;background-color:${item.color};"></span>`;
            res += `${item.seriesName}: <b>${formatBytes(item.value * 1024)}/s</b><br/>`;
          });
          return res;
        }
      },
      legend: {
        data: ['下载速率', '上传速率'],
        textStyle: { color: '#b2b8ca' },
        top: 0
      },
      grid: {
        left: '2%',
        right: '2%',
        bottom: '3%',
        top: '12%',
        containLabel: true
      },
      xAxis: {
        type: 'category',
        boundaryGap: false,
        data: [],
        axisLine: { lineStyle: { color: '#363b50' } },
        axisLabel: { color: '#969db3' }
      },
      yAxis: {
        type: 'value',
        axisLine: { lineStyle: { color: '#363b50' } },
        splitLine: { lineStyle: { color: '#262b3a' } },
        axisLabel: {
          color: '#969db3',
          formatter: function (value) {
            return formatBytes(value * 1024);
          }
        }
      },
      series: [
        {
          name: '下载速率',
          type: 'line',
          smooth: true,
          showSymbol: false,
          data: [],
          itemStyle: { color: '#4f8cff' },
          lineStyle: { width: 3 },
          areaStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: 'rgba(79, 140, 255, 0.25)' },
              { offset: 1, color: 'rgba(79, 140, 255, 0)' }
            ])
          }
        },
        {
          name: '上传速率',
          type: 'line',
          smooth: true,
          showSymbol: false,
          data: [],
          itemStyle: { color: '#22c55e' },
          lineStyle: { width: 3 },
          areaStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: 'rgba(34, 197, 94, 0.25)' },
              { offset: 1, color: 'rgba(34, 197, 94, 0)' }
            ])
          }
        }
      ]
    };
    
    myChart.setOption(chartOption);
    window.addEventListener('resize', () => myChart.resize());

    // ── 格式化辅助函数 ────────────────────────────────────
    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function formatUptime(seconds) {
      if (!seconds) return '-';
      const d = Math.floor(seconds / (3600 * 24));
      const h = Math.floor((seconds % (3600 * 24)) / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      if (d > 0) return `${d}天 ${h}时 ${m}分`;
      if (h > 0) return `${h}时 ${m}分`;
      return `${m}分`;
    }

    // ── 数据获取与绑定 ────────────────────────────────────
    function startDataConnection() {
      if (!!window.EventSource) {
        sseSource = new EventSource('/events');
        
        sseSource.onmessage = function(event) {
          const data = JSON.parse(event.data);
          updateDashboard(data);
        };

        sseSource.onerror = function() {
          console.warn("SSE disconnected, rolling back to polling mode...");
          sseSource.close();
          startPollingFallback();
        };
      } else {
        startPollingFallback();
      }
    }

    function startPollingFallback() {
      if (fallbackInterval) clearInterval(fallbackInterval);
      
      const fetchSnapshot = () => {
        fetch('/api/snapshot')
          .then(res => res.json())
          .then(data => {
            updateDashboard(data);
          })
          .catch(err => console.error("Polling error:", err));
      };
      
      fetchSnapshot();
      fallbackInterval = setInterval(fetchSnapshot, 2000);
    }

    // ── 看板渲染 ────────────────────────────────────────
    function updateDashboard(data) {
      if (data.error) {
        console.error(data.error);
        return;
      }

      // 系统版本与运行时长
      document.getElementById('sys-version').innerText = `iKuai ${data.version || '--'}`;
      document.getElementById('sys-uptime').innerText = formatUptime(data.uptime);
      document.getElementById('dev-count').innerText = `${data.device_count || 0} 台`;

      // 系统负载 (CPU / 内存)
      const cpu = data.cpu_usage || 0;
      document.getElementById('cpu-text').innerText = `${cpu.toFixed(1)}%`;
      document.getElementById('cpu-bar').style.width = `${cpu}%`;
      // 调整 CPU 颜色
      adjustColorClass('cpu-bar', cpu);

      const memPct = data.mem_usage_pct || 0;
      document.getElementById('mem-text').innerText = `${memPct.toFixed(1)}%`;
      document.getElementById('mem-bar').style.width = `${memPct}%`;
      document.getElementById('mem-mb').innerText = `${Math.round(data.mem_used_mb)}/${Math.round(data.mem_total_mb)}`;
      adjustColorClass('mem-bar', memPct);

      // 接口状态绑定
      const wan = data.interfaces.find(i => i.type === 'PPPOE' || i.name.includes('wan')) || {};
      const lan = data.interfaces.find(i => !i.name.includes('wan')) || {};
      document.getElementById('lan-ip').innerText = lan.ip || '--';
      document.getElementById('wan-ip').innerText = wan.ip || '--';
      document.getElementById('wan-proto').innerText = wan.type || 'DHCP/STATIC';

      // 实时 WAN 上下行值
      const downKB = data.wan_speed.down || 0;
      const upKB = data.wan_speed.up || 0;
      document.getElementById('wan-down-speed').innerText = `${formatBytes(downKB * 1024)}/s`;
      document.getElementById('wan-up-speed').innerText = `${formatBytes(upKB * 1024)}/s`;

      // 如果当前是实时模式，动态累加并重绘 ECharts
      if (chartMode === 'realtime') {
        const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        
        // 解析自带的内存历史（若有），以便首次载入时直接填充线条
        if (realtimeTimeline.length === 0 && data.history && data.history.length > 0) {
          data.history.forEach(pt => {
            const ptTime = new Date(pt.time * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            realtimeTimeline.push(ptTime);
            realtimeDownData.push(pt.down);
            realtimeUpData.push(pt.up);
          });
        }

        realtimeTimeline.push(timeStr);
        realtimeDownData.push(downKB);
        realtimeUpData.push(upKB);

        if (realtimeTimeline.length > MAX_REALTIME_POINTS) {
          realtimeTimeline.shift();
          realtimeDownData.shift();
          realtimeUpData.shift();
        }

        myChart.setOption({
          xAxis: { data: realtimeTimeline },
          series: [
            { data: realtimeDownData },
            { data: realtimeUpData }
          ]
        });
      }

      // 设备列表绑定
      currentDevices = data.devices || [];
      renderDeviceTable();
    }

    function adjustColorClass(elementId, val) {
      const el = document.getElementById(elementId);
      el.className = 'progress-bar-fill';
      if (val < 50) {
        el.classList.add('success');
      } else if (val < 85) {
        el.classList.add('warning');
      } else {
        el.classList.add('danger');
      }
    }

    // ── 历史曲线与 Prometheus Range 对接 ──────────────────────
    function setChartMode(mode) {
      chartMode = mode;
      
      // 更新按钮状态
      document.querySelectorAll('.chart-actions .btn').forEach(btn => btn.classList.remove('active'));
      const activeBtnId = {
        'realtime': 'btn-realtime',
        '15m': 'btn-15m',
        '1h': 'btn-1h',
        '24h': 'btn-24h'
      }[mode];
      document.getElementById(activeBtnId).classList.add('active');

      if (mode === 'realtime') {
        // 回到实时，清空并以当前数据作为起点
        realtimeTimeline = [];
        realtimeDownData = [];
        realtimeUpData = [];
        // 重新使用 SSE / Polling 推动 ECharts
        return;
      }

      // 否则从后端代理 Prometheus 提取长线数据
      const durationMap = {
        '15m': { duration: 900, step: 15 },
        '1h': { duration: 3600, step: 60 },
        '24h': { duration: 86400, step: 600 }
      };
      
      const { duration, step } = durationMap[mode];
      
      // 显示 ECharts loading
      myChart.showLoading({
        text: '加载时序数据...',
        color: '#4f8cff',
        textColor: '#e4e7f0',
        maskColor: 'rgba(15, 18, 25, 0.7)'
      });

      Promise.all([
        fetch(`/api/range?metric=wan_down&duration=${duration}&step=${step}`).then(res => res.json()),
        fetch(`/api/range?metric=wan_up&duration=${duration}&step=${step}`).then(res => res.json())
      ]).then(([downRes, upRes]) => {
        myChart.hideLoading();

        if (downRes.status !== 'success' || upRes.status !== 'success') {
          console.error("Failed to load range metrics from Prometheus");
          return;
        }

        const times = [];
        const downVals = [];
        const upVals = [];

        // 对齐时间戳
        const downMap = new Map();
        downRes.points.forEach(p => downMap.set(p.time, p.value));

        upRes.points.forEach(p => {
          const t = p.time;
          const dateStr = new Date(t * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
          times.push(dateStr);
          upVals.push(p.value);
          downVals.push(downMap.get(t) || 0.0);
        });

        myChart.setOption({
          xAxis: { data: times },
          series: [
            { data: downVals },
            { data: upVals }
          ]
        });
      }).catch(err => {
        myChart.hideLoading();
        console.error(err);
      });
    }

    // ── 设备列表排序与绘制 ──────────────────────────────────
    function sortTable(key) {
      if (sortKey === key) {
        sortDesc = !sortDesc;
      } else {
        sortKey = key;
        sortDesc = true;
      }
      
      // 更新排序图标指示
      renderDeviceTable();
    }

    function renderDeviceTable() {
      const tbody = document.getElementById('device-table-body');
      
      if (currentDevices.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--color-text-muted);">暂无活跃终端设备</td></tr>`;
        return;
      }

      // 排序
      currentDevices.sort((a, b) => {
        let vA = a[sortKey];
        let vB = b[sortKey];
        
        // 字符串比对处理
        if (typeof vA === 'string') {
          vA = vA.toLowerCase();
          vB = vB.toLowerCase();
        }
        
        if (vA < vB) return sortDesc ? 1 : -1;
        if (vA > vB) return sortDesc ? -1 : 1;
        return 0;
      });

      tbody.innerHTML = '';
      currentDevices.forEach(dev => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <div class="dev-name-col">
              <span class="dev-name">${dev.name || '未知设备'}</span>
              <span class="dev-mac">${dev.mac || '--'}</span>
            </div>
          </td>
          <td><span class="dev-ip">${dev.ip}</span></td>
          <td><span class="dev-rate rate-down">${formatBytes(dev.down_rate * 1024)}/s</span></td>
          <td><span class="dev-rate rate-up">${formatBytes(dev.up_rate * 1024)}/s</span></td>
          <td><span class="dev-conns">${dev.conns}</span></td>
        `;
        tbody.appendChild(tr);
      });
    }

    // 初始化图标
    feather.replace();
    
    // 建立通信
    startDataConnection();
  </script>
</body>
</html>
